{% extends "base.html" %}
{% block content %}
<section class="grid gap-6 lg:grid-cols-[320px_1fr]">
  <aside class="rounded-3xl bg-white p-5 shadow-sm">
    <h2 class="text-xl font-bold">Histórico</h2>
    <p class="mt-2 text-sm text-slate-500">As mensagens da sessão atual aparecem aqui conforme o mesmo chat central evolui.</p>
    <div id="chat-history" class="mt-4 space-y-3"></div>
  </aside>
  <div class="rounded-3xl bg-white p-5 shadow-sm">
    <h2 class="text-xl font-bold">Chat central</h2>
    <p class="mt-2 text-sm text-slate-500">Use o mesmo chat para clientes, contatos, solicitações, documentos e relatórios.</p>
    <div id="chat-messages" class="mt-6 flex min-h-[28rem] flex-col gap-4 rounded-[1.75rem] bg-slate-50 p-5"></div>
    <form id="chat-form" class="mt-6 flex gap-3">
      <input id="chat-input" class="flex-1 rounded-2xl border border-slate-200 px-4 py-3" placeholder="Ex.: Quais clientes têm solicitações em aberto? ou Me mostre o contato principal da empresa X" />
      <button class="rounded-2xl bg-slate-900 px-5 py-3 font-semibold text-white" type="submit">Enviar</button>
    </form>
    <p id="chat-loading" class="mt-3 text-sm text-sky-700"></p>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script src="/static/js/chat.js"></script>
{% endblock %}
