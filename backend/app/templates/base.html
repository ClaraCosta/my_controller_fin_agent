<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title or "MY CONTROLLER FINANCE" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <div class="min-h-screen md:grid md:grid-cols-[260px_1fr]">
      <aside class="bg-slate-900 px-6 py-8 text-white">
        <div class="mb-8">
          <h1 class="text-2xl font-bold">AI Ops</h1>
          <p class="text-sm text-slate-300">Plataforma operacional com IA</p>
        </div>
        <nav class="space-y-3 text-sm">
          <a class="block rounded-lg px-4 py-3 hover:bg-slate-800" href="/dashboard">Dashboard</a>
          <a class="block rounded-lg px-4 py-3 hover:bg-slate-800" href="/chat">Chat</a>
        </nav>
      </aside>
      <main class="p-6 md:p-10">
        {% block content %}{% endblock %}
      </main>
    </div>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
