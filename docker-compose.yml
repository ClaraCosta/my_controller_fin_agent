services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_ops_app
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:Z
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    command: ["/app/scripts/start.sh"]

  db:
    image: postgres:16-alpine
    container_name: ai_ops_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_ops}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-ai_ops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ai_ops_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
